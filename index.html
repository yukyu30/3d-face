<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Face Mask</title>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"
      crossorigin="anonymous"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #e94560;
      }

      .main-content {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 20px;
      }

      .image-area {
        background: #16213e;
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .panel {
        background: #16213e;
        border-radius: 12px;
        padding: 16px;
      }

      .panel h2 {
        font-size: 14px;
        margin-bottom: 12px;
        color: #e94560;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
        justify-content: center;
      }

      button {
        background: #e94560;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
      }

      button:hover {
        background: #c73e54;
      }

      button:disabled {
        background: #555;
        cursor: not-allowed;
      }

      input[type="text"],
      input[type="file"] {
        width: 100%;
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #333;
        background: #0f3460;
        color: #eee;
        font-size: 14px;
        margin-bottom: 8px;
      }

      input[type="file"] {
        padding: 6px;
      }

      label {
        display: block;
        font-size: 12px;
        color: #aaa;
        margin-bottom: 4px;
      }

      .preview-container {
        position: relative;
        display: inline-block;
      }

      #preview {
        max-width: 100%;
        max-height: 500px;
        display: none;
        border-radius: 8px;
      }

      #result {
        max-width: 100%;
        max-height: 500px;
        border-radius: 8px;
        display: none;
      }

      .registry-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        background: #0f3460;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 13px;
      }

      .registry-item .delete-btn {
        background: #c73e54;
        padding: 4px 8px;
        font-size: 11px;
        border-radius: 4px;
      }

      .status {
        text-align: center;
        color: #aaa;
        font-size: 13px;
        margin-top: 8px;
      }

      .drop-zone {
        border: 2px dashed #333;
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        color: #666;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: #e94560;
        color: #e94560;
      }

      .file-name {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>3D Face Mask</h1>

      <div class="main-content">
        <div class="image-area">
          <div id="dropZone" class="drop-zone">
            画像をドラッグ＆ドロップ、またはクリックして選択
            <input
              type="file"
              id="fileInput"
              accept="image/*"
              style="display: none"
            />
          </div>
          <div id="fileName" class="file-name"></div>

          <div class="preview-container">
            <img id="preview" alt="プレビュー" />
            <canvas id="result"></canvas>
          </div>

          <div class="controls">
            <button id="processBtn" disabled>顔を隠す</button>
            <button id="saveBtn" disabled>保存</button>
          </div>

          <div id="status" class="status"></div>
        </div>

        <div class="sidebar">
          <div class="panel">
            <h2>人物登録</h2>
            <label>名前</label>
            <input type="text" id="personName" placeholder="名前を入力" />
            <label>3Dモデル（オプション）</label>
            <input type="text" id="modelUrl" placeholder="モデルパス" />
            <button id="registerBtn" style="width: 100%; margin-top: 8px">
              この顔を登録
            </button>
          </div>

          <div class="panel">
            <h2>登録済み人物</h2>
            <div id="registryList"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
