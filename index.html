<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Face Mask</title>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"
      crossorigin="anonymous"
    ></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
        overflow: hidden;
      }
      .app { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }

      /* --- Canvas Area --- */
      .canvas-area {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        overflow: hidden;
      }
      #preview {
        max-width: 100%;
        max-height: 100%;
        display: none;
        position: absolute;
      }
      #threeCanvas {
        position: absolute;
        pointer-events: none;
      }
      .drop-zone {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px dashed #444;
        color: #666;
        font-size: 18px;
        cursor: pointer;
        z-index: 10;
        transition: border-color 0.2s;
      }
      .drop-zone:hover, .drop-zone.dragover { border-color: #e94560; color: #e94560; }
      .drop-zone.hidden { display: none; }

      /* --- Controls bar --- */
      .controls-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.7);
        padding: 12px 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        z-index: 20;
      }
      .controls-bar .file-name { font-size: 12px; color: #aaa; flex: 1; }

      /* --- Sidebar --- */
      .sidebar {
        background: #16213e;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        border-left: 1px solid #0f3460;
      }
      .panel { padding: 14px; border-bottom: 1px solid #0f3460; }
      .panel h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #e94560;
        margin-bottom: 10px;
      }

      /* --- Buttons --- */
      button {
        background: #e94560;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.2s;
      }
      button:hover { background: #c73e54; }
      button:disabled { background: #444; cursor: not-allowed; }
      button.secondary { background: #0f3460; }
      button.secondary:hover { background: #1a5276; }
      button.small { padding: 4px 8px; font-size: 11px; }
      button.danger { background: #c0392b; }

      /* --- Inputs --- */
      input[type="text"], select {
        width: 100%;
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #333;
        background: #0f3460;
        color: #eee;
        font-size: 13px;
        margin-bottom: 6px;
      }
      label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; }

      /* --- Mask list --- */
      .mask-item {
        background: #0f3460;
        border-radius: 6px;
        padding: 8px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .mask-item .mask-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .mask-item .mask-header span { font-weight: bold; }
      .mask-item .slider-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 3px;
      }
      .mask-item .slider-row label { margin: 0; min-width: 24px; }
      .mask-item input[type="range"] { flex: 1; }

      /* --- Model list --- */
      .model-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 8px;
        background: #0f3460;
        border-radius: 4px;
        margin-bottom: 4px;
        font-size: 12px;
      }

      /* --- Registry --- */
      .registry-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 8px;
        background: #0f3460;
        border-radius: 4px;
        margin-bottom: 4px;
        font-size: 12px;
      }

      .status { font-size: 12px; color: #aaa; padding: 6px 0; }

      input[type="file"] { display: none; }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="canvas-area">
        <div id="dropZone" class="drop-zone">
          画像をドラッグ＆ドロップ、またはクリックして選択
        </div>
        <input type="file" id="fileInput" accept="image/*" />
        <img id="preview" alt="" />
        <canvas id="threeCanvas"></canvas>

        <div class="controls-bar">
          <span id="fileName" class="file-name"></span>
          <button id="detectBtn" disabled>顔検出</button>
          <button id="addMaskBtn" class="secondary" disabled>手動マスク追加</button>
          <button id="saveBtn" disabled>保存</button>
        </div>
      </div>

      <div class="sidebar">
        <div class="panel">
          <h2>マスク一覧</h2>
          <div id="maskList"></div>
          <div id="status" class="status"></div>
        </div>

        <div class="panel">
          <h2>3Dモデル管理</h2>
          <button id="importModelBtn" style="width:100%;margin-bottom:8px">モデルをインポート</button>
          <div id="modelList"></div>
        </div>

        <div class="panel">
          <h2>人物登録</h2>
          <label>名前</label>
          <input type="text" id="personName" placeholder="名前" />
          <label>使用モデル</label>
          <select id="personModelSelect">
            <option value="">デフォルト（ボックス）</option>
          </select>
          <button id="registerBtn" style="width:100%;margin-top:6px">この顔を登録</button>
        </div>

        <div class="panel">
          <h2>登録済み人物</h2>
          <div id="registryList"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
